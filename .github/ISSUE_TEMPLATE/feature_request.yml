name: Feature request
description: Propose a focused product or developer improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem to solve }
    validations: { required: true }
  - type: textarea
    id: outcome
    attributes: { label: Desired outcome and acceptance criteria }
    validations: { required: true }
  - type: textarea
    id: privacy
    attributes: { label: Privacy, compatibility or migration impact }
