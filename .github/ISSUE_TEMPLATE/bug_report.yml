name: Bug report
description: Report reproducible Starter Kit behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes: { label: What happened?, description: Include expected and actual behavior. }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: Reproduction steps, description: Use synthetic data only; never attach customer files. }
    validations: { required: true }
  - type: input
    id: environment
    attributes: { label: Browser, OS and Starter Kit version }
    validations: { required: true }
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed names, contacts, credentials and private business data.
          required: true
